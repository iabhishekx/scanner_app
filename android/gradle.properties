# Increase memory and stabilize network connection
org.gradle.jvmargs=-Xmx4G -Djava.net.preferIPv4Stack=true -Dhttps.protocols=TLSv1.2,TLSv1.3 -Dhttp.keepAlive=false

# Increased timeouts for unstable networks
org.gradle.http.connectionTimeout=120000
org.gradle.http.socketTimeout=120000

android.useAndroidX=true
android.enableJetifier=true

# Disable background processes that might hold onto corrupted caches
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=false
