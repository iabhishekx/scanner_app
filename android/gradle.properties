# Increase memory and stabilize network connection
org.gradle.jvmargs=-Xmx4G -Djava.net.preferIPv4Stack=true -Dhttp.keepAlive=false -Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000

android.useAndroidX=true
android.enableJetifier=true

# Disable background processes that might hold onto corrupted caches
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.configureondemand=false
